<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carros premium</title>
</head>
<body>

    <!-- Header -->
    <header class="header-section" id="headerSection">
        <div>
            <h1>
                Carros premiums
            </h1>
        </div>
    </header>

    <!-- Section main -->
    <section class="main-section" id="mainSection">

        <p>Explore os modelos mais luxuosos e potentes do mercado.</p>

        <img src="../assets/LuxeCar.webp" alt="Imagem ilustrando carro de luxo">        

        <div class="contact-form" id="contactForm">
            <h3 class="title-form">Entre em Contato</h3>
            <form action="">
                <label for="modelo">Modelo do carro:</label>
                <input type="text" id="modelo" placeholder="Digite o modelo do carro">
                
                <label for="marca">Marca do carro:</label>
                <input type="text" id="marca" placeholder="Digite a marca do carro">
                
                <label for="ano">Ano do carro:</label>
                <input type="text" id="ano" placeholder="Digite o ano do carro">
                
                <label for="preco">Preço do carro:</label>
                <input type="text" id="preco" placeholder="Digite o preço do carro">
                
                <button type="submit">Enviar</button>
            </form>
        </div>

    </section>

   <!-- Footer -->
    <footer class="footer-section" id="footerSection">
        <div>
            <p>
                &copy; 2025 Carros Premium. Todos os direitos reservados.
            </p>
        </div>
    </footer>
</body>
</html>
